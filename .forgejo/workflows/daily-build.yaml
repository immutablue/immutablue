# daily-build.yaml - Forgejo CI scheduled workflow
#
# Builds deps containers and image variants for current and previous
# Fedora versions daily at 6:00 AM Eastern (10:00 UTC).
#
# Job dependency graph:
#   deps-current  ──┐
#                   ├──> builds (matrix, max-parallel: 4)
#   deps-previous ──┘
#
# Required secrets:
#   QUAY_USER  - quay.io username
#   QUAY_TOKEN - quay.io password/token
#
# SPDX-License-Identifier: AGPL-3.0-or-later

name: Daily Build

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

env:
  # Update version_arg in the build matrix when changing this
  PREVIOUS_VERSION: "42"

jobs:
  # --------------------------------------------------------------------------
  # Dependency container builds (run in parallel)
  # --------------------------------------------------------------------------
  deps-current:
    runs-on: linux-amd64
    container:
      image: git.podbielniak.com/zachpodbielniak/build-container:43
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules over HTTPS
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://git.podbielniak.com/".insteadOf "git@git-ssh.podbielniak.com:"
          git submodule update --init --recursive

      - name: Login to quay.io
        env:
          QUAY_USER: ${{ secrets.QUAY_USER }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          backoff=30
          for attempt in 1 2 3; do
              if buildah login -u "${QUAY_USER}" -p "${QUAY_TOKEN}" quay.io; then
                  exit 0
              fi
              echo "Login attempt $attempt failed, retrying in ${backoff}s..."
              sleep "$backoff"
              backoff=$((backoff * 2))
          done
          echo "All login attempts failed"
          exit 1

      - name: Build deps container
        run: make build-deps

      - name: Push deps container
        run: make push-deps

      - name: Clean up images
        run: make clean-deps

  deps-previous:
    runs-on: linux-amd64
    container:
      image: git.podbielniak.com/zachpodbielniak/build-container:43
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules over HTTPS
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://git.podbielniak.com/".insteadOf "git@git-ssh.podbielniak.com:"
          git submodule update --init --recursive

      - name: Login to quay.io
        env:
          QUAY_USER: ${{ secrets.QUAY_USER }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          backoff=30
          for attempt in 1 2 3; do
              if buildah login -u "${QUAY_USER}" -p "${QUAY_TOKEN}" quay.io; then
                  exit 0
              fi
              echo "Login attempt $attempt failed, retrying in ${backoff}s..."
              sleep "$backoff"
              backoff=$((backoff * 2))
          done
          echo "All login attempts failed"
          exit 1

      - name: Build deps container
        run: make VERSION=${{ env.PREVIOUS_VERSION }} build-deps

      - name: Push deps container
        run: make VERSION=${{ env.PREVIOUS_VERSION }} push-deps

      - name: Clean up images
        run: make VERSION=${{ env.PREVIOUS_VERSION }} clean-deps

  # --------------------------------------------------------------------------
  # Image builds (matrix, max 4 concurrent)
  #
  # Waits for both deps jobs to finish, then runs all variant+version
  # combinations with at most 4 in parallel.
  # --------------------------------------------------------------------------
  builds:
    needs: [deps-current, deps-previous]
    runs-on: linux-amd64
    container:
      image: git.podbielniak.com/zachpodbielniak/build-container:43
      options: --privileged

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        variant:
          - "ZFS=1"
          - "LTS=1"
          - "KUBERBLUE=1"
          - "TRUEBLUE=1"
          - "KUBERBLUE=1 TRUEBLUE=1"
          - "NUCLEUS=1"
          - "NUCLEUS=1 LTS=1"
          - "NUCLEUS=1 KUBERBLUE=1"
          - "NUCLEUS=1 TRUEBLUE=1"
          - "NUCLEUS=1 LTS=1 KUBERBLUE=1"
          - "NUCLEUS=1 KUBERBLUE=1 TRUEBLUE=1"
        version_arg:
          - ""
          - "VERSION=42"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules over HTTPS
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://git.podbielniak.com/".insteadOf "git@git-ssh.podbielniak.com:"
          git submodule update --init --recursive

      - name: Login to quay.io
        env:
          QUAY_USER: ${{ secrets.QUAY_USER }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          backoff=30
          for attempt in 1 2 3; do
              if buildah login -u "${QUAY_USER}" -p "${QUAY_TOKEN}" quay.io; then
                  exit 0
              fi
              echo "Login attempt $attempt failed, retrying in ${backoff}s..."
              sleep "$backoff"
              backoff=$((backoff * 2))
          done
          echo "All login attempts failed"
          exit 1

      - name: Pre-test (shellcheck)
        run: make ${{ matrix.variant }} ${{ matrix.version_arg }} pre_test

      - name: Build image
        run: make ${{ matrix.variant }} ${{ matrix.version_arg }} SKIP_TEST=1 build

      - name: Test image
        run: make ${{ matrix.variant }} ${{ matrix.version_arg }} test

      - name: Push image
        run: make ${{ matrix.variant }} ${{ matrix.version_arg }} push

      - name: Clean up images
        run: make ${{ matrix.variant }} ${{ matrix.version_arg }} clean-build

  # --------------------------------------------------------------------------
  # Trigger downstream builds after all variants complete
  # --------------------------------------------------------------------------
  trigger-downstream:
    needs: [builds]
    runs-on: linux-amd64
    container:
      image: git.podbielniak.com/zachpodbielniak/build-container:43

    steps:
      - name: Trigger hyacinth-macaw build
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          curl -sf -X POST \
              -H "Authorization: token ${FORGEJO_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"ref":"master"}' \
              "https://git.podbielniak.com/api/v1/repos/immutablue/hyacinth-macaw/actions/workflows/on-daily-build.yaml/dispatches"
