# daily-build.yaml - Forgejo CI scheduled workflow
#
# Builds deps containers and image variants for current and previous
# Fedora versions daily at 6:00 AM Eastern (10:00 UTC).
#
# Job dependency graph:
#   deps-current  ──┬──> build-zfs-current
#                   └──> build-lts-current
#   deps-previous ──┬──> build-zfs-previous
#                   └──> build-lts-previous
#
# Required secrets:
#   QUAY_USER  - quay.io username
#   QUAY_TOKEN - quay.io password/token
#
# SPDX-License-Identifier: AGPL-3.0-or-later

name: Daily Build

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

env:
  PREVIOUS_VERSION: "42"

jobs:
  # --------------------------------------------------------------------------
  # Dependency container builds (run in parallel)
  # --------------------------------------------------------------------------
  deps-current:
    runs-on: linux-amd64
    container:
      image: git.podbielniak.com/zachpodbielniak/build-container:43
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules over HTTPS
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://git.podbielniak.com/".insteadOf "git@git-ssh.podbielniak.com:"
          git submodule update --init --recursive

      - name: Login to quay.io
        env:
          QUAY_USER: ${{ secrets.QUAY_USER }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          buildah login \
              -u "${QUAY_USER}" \
              -p "${QUAY_TOKEN}" \
              quay.io

      - name: Build deps container
        run: make build-deps

      - name: Push deps container
        run: make push-deps

  deps-previous:
    runs-on: linux-amd64
    container:
      image: git.podbielniak.com/zachpodbielniak/build-container:43
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules over HTTPS
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://git.podbielniak.com/".insteadOf "git@git-ssh.podbielniak.com:"
          git submodule update --init --recursive

      - name: Login to quay.io
        env:
          QUAY_USER: ${{ secrets.QUAY_USER }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          buildah login \
              -u "${QUAY_USER}" \
              -p "${QUAY_TOKEN}" \
              quay.io

      - name: Build deps container
        run: make VERSION=${{ env.PREVIOUS_VERSION }} build-deps

      - name: Push deps container
        run: make VERSION=${{ env.PREVIOUS_VERSION }} push-deps

  # --------------------------------------------------------------------------
  # Image builds (run in parallel after their respective deps job)
  # --------------------------------------------------------------------------
  build-zfs-current:
    needs: deps-current
    runs-on: linux-amd64
    container:
      image: git.podbielniak.com/zachpodbielniak/build-container:43
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules over HTTPS
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://git.podbielniak.com/".insteadOf "git@git-ssh.podbielniak.com:"
          git submodule update --init --recursive

      - name: Login to quay.io
        env:
          QUAY_USER: ${{ secrets.QUAY_USER }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          buildah login \
              -u "${QUAY_USER}" \
              -p "${QUAY_TOKEN}" \
              quay.io

      - name: Pre-test (shellcheck)
        run: make ZFS=1 pre_test

      - name: Build image
        run: make ZFS=1 SKIP_TEST=1 build

      - name: Test image
        run: make ZFS=1 test

      - name: Push image
        run: make ZFS=1 push

  build-lts-current:
    needs: deps-current
    runs-on: linux-amd64
    container:
      image: git.podbielniak.com/zachpodbielniak/build-container:43
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules over HTTPS
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://git.podbielniak.com/".insteadOf "git@git-ssh.podbielniak.com:"
          git submodule update --init --recursive

      - name: Login to quay.io
        env:
          QUAY_USER: ${{ secrets.QUAY_USER }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          buildah login \
              -u "${QUAY_USER}" \
              -p "${QUAY_TOKEN}" \
              quay.io

      - name: Pre-test (shellcheck)
        run: make LTS=1 pre_test

      - name: Build image
        run: make LTS=1 SKIP_TEST=1 build

      - name: Test image
        run: make LTS=1 test

      - name: Push image
        run: make LTS=1 push

  build-zfs-previous:
    needs: deps-previous
    runs-on: linux-amd64
    container:
      image: git.podbielniak.com/zachpodbielniak/build-container:43
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules over HTTPS
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://git.podbielniak.com/".insteadOf "git@git-ssh.podbielniak.com:"
          git submodule update --init --recursive

      - name: Login to quay.io
        env:
          QUAY_USER: ${{ secrets.QUAY_USER }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          buildah login \
              -u "${QUAY_USER}" \
              -p "${QUAY_TOKEN}" \
              quay.io

      - name: Pre-test (shellcheck)
        run: make ZFS=1 VERSION=${{ env.PREVIOUS_VERSION }} pre_test

      - name: Build image
        run: make ZFS=1 VERSION=${{ env.PREVIOUS_VERSION }} SKIP_TEST=1 build

      - name: Test image
        run: make ZFS=1 VERSION=${{ env.PREVIOUS_VERSION }} test

      - name: Push image
        run: make ZFS=1 VERSION=${{ env.PREVIOUS_VERSION }} push

  build-lts-previous:
    needs: deps-previous
    runs-on: linux-amd64
    container:
      image: git.podbielniak.com/zachpodbielniak/build-container:43
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules over HTTPS
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://git.podbielniak.com/".insteadOf "git@git-ssh.podbielniak.com:"
          git submodule update --init --recursive

      - name: Login to quay.io
        env:
          QUAY_USER: ${{ secrets.QUAY_USER }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          buildah login \
              -u "${QUAY_USER}" \
              -p "${QUAY_TOKEN}" \
              quay.io

      - name: Pre-test (shellcheck)
        run: make LTS=1 VERSION=${{ env.PREVIOUS_VERSION }} pre_test

      - name: Build image
        run: make LTS=1 VERSION=${{ env.PREVIOUS_VERSION }} SKIP_TEST=1 build

      - name: Test image
        run: make LTS=1 VERSION=${{ env.PREVIOUS_VERSION }} test

      - name: Push image
        run: make LTS=1 VERSION=${{ env.PREVIOUS_VERSION }} push
