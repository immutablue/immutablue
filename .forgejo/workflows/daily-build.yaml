# daily-build.yaml - Forgejo CI scheduled workflow
#
# Builds deps containers and image variants for current and previous
# Fedora versions daily at 6:00 AM Eastern (10:00 UTC).
#
# Job dependency graph:
#   deps-current  ──┐
#                   ├──> builds (matrix, max-parallel: 4)
#   deps-previous ──┘
#
# Required secrets:
#   QUAY_USER  - quay.io username
#   QUAY_TOKEN - quay.io password/token
#
# SPDX-License-Identifier: AGPL-3.0-or-later

name: Daily Build

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

env:
  # Update version_arg in the build matrix when changing this
  PREVIOUS_VERSION: "42"

jobs:
  # --------------------------------------------------------------------------
  # Dependency container builds (run in parallel)
  # --------------------------------------------------------------------------
  deps-current:
    runs-on: linux-amd64
    container:
      image: git.podbielniak.com/zachpodbielniak/build-container:43
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules over HTTPS
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://git.podbielniak.com/".insteadOf "git@git-ssh.podbielniak.com:"
          git submodule update --init --recursive

      - name: Login to quay.io
        env:
          QUAY_USER: ${{ secrets.QUAY_USER }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          buildah login \
              -u "${QUAY_USER}" \
              -p "${QUAY_TOKEN}" \
              quay.io

      - name: Build deps container
        run: make build-deps

      - name: Push deps container
        run: make push-deps

  deps-previous:
    runs-on: linux-amd64
    container:
      image: git.podbielniak.com/zachpodbielniak/build-container:43
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules over HTTPS
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://git.podbielniak.com/".insteadOf "git@git-ssh.podbielniak.com:"
          git submodule update --init --recursive

      - name: Login to quay.io
        env:
          QUAY_USER: ${{ secrets.QUAY_USER }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          buildah login \
              -u "${QUAY_USER}" \
              -p "${QUAY_TOKEN}" \
              quay.io

      - name: Build deps container
        run: make VERSION=${{ env.PREVIOUS_VERSION }} build-deps

      - name: Push deps container
        run: make VERSION=${{ env.PREVIOUS_VERSION }} push-deps

  # --------------------------------------------------------------------------
  # Image builds (matrix, max 4 concurrent)
  #
  # Waits for both deps jobs to finish, then runs all variant+version
  # combinations with at most 4 in parallel.
  # --------------------------------------------------------------------------
  builds:
    needs: [deps-current, deps-previous]
    runs-on: linux-amd64
    container:
      image: git.podbielniak.com/zachpodbielniak/build-container:43
      options: --privileged

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        variant:
          - "ZFS=1"
          - "LTS=1"
          - "KUBERBLUE=1"
          - "TRUEBLUE=1"
          - "NUCLEUS=1"
          - "NUCLEUS=1 LTS=1"
          - "NUCLEUS=1 KUBERBLUE=1"
          - "NUCLEUS=1 TRUEBLUE=1"
          - "NUCLEUS=1 LTS=1 KUBERBLUE=1"
        version_arg:
          - ""
          - "VERSION=42"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules over HTTPS
        run: |
          git config --global url."https://gitlab.com/".insteadOf "git@gitlab.com:"
          git config --global url."https://git.podbielniak.com/".insteadOf "git@git-ssh.podbielniak.com:"
          git submodule update --init --recursive

      - name: Login to quay.io
        env:
          QUAY_USER: ${{ secrets.QUAY_USER }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          buildah login \
              -u "${QUAY_USER}" \
              -p "${QUAY_TOKEN}" \
              quay.io

      - name: Pre-test (shellcheck)
        run: make ${{ matrix.variant }} ${{ matrix.version_arg }} pre_test

      - name: Build image
        run: make ${{ matrix.variant }} ${{ matrix.version_arg }} SKIP_TEST=1 build

      - name: Test image
        run: make ${{ matrix.variant }} ${{ matrix.version_arg }} test

      - name: Push image
        run: make ${{ matrix.variant }} ${{ matrix.version_arg }} push
