apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: mayastor-storage-test
  annotations:
    kuberblue.test/component: "mayastor"
    kuberblue.test/category: "storage"
    kuberblue.test/priority: "high"
    kuberblue.test/timeout: "600s"
spec:
  timeouts:
    apply: 120s
    assert: 600s
    cleanup: 120s
  steps:

  # Step 1: Verify Mayastor namespace and pods are running
  - name: verify-mayastor-deployment
    try:
    - assert:
        resource:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: openebs
          status:
            phase: Active
    - script:
        timeout: 120s
        content: |
          # Verify Mayastor control-plane pods are running
          NOT_READY=$(kubectl get pods -n openebs -l app=mayastor --no-headers 2>/dev/null \
            | grep -v -E "Running|Completed|Succeeded" | grep -v "^$" | wc -l)
          if [[ "${NOT_READY}" -gt 0 ]]; then
            echo "ERROR: ${NOT_READY} Mayastor pod(s) not ready"
            kubectl get pods -n openebs -l app=mayastor
            exit 1
          fi

          TOTAL=$(kubectl get pods -n openebs --no-headers | wc -l)
          echo "Mayastor namespace has ${TOTAL} pod(s) running"

  # Step 2: Verify the openebs-replicated-3 StorageClass exists
  - name: verify-storage-class
    try:
    - assert:
        resource:
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: openebs-replicated-3

  # Step 3: Create PVC with openebs-replicated-3 StorageClass
  - name: test-pvc-provisioning
    try:
    - apply:
        resource:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: mayastor-test
    - apply:
        resource:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: mayastor-test-pvc
            namespace: mayastor-test
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: openebs-replicated-3
            resources:
              requests:
                storage: 1Gi
    - assert:
        resource:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: mayastor-test-pvc
            namespace: mayastor-test
          status:
            phase: Bound

  # Step 4: Create Pod that mounts the PVC and writes data
  - name: test-write-data
    try:
    - apply:
        resource:
          apiVersion: v1
          kind: Pod
          metadata:
            name: mayastor-writer
            namespace: mayastor-test
          spec:
            containers:
            - name: writer
              image: busybox:latest
              command:
              - sh
              - -c
              - |
                echo "mayastor-persistence-test-data-$(date +%s)" > /data/test-marker.txt &&
                cat /data/test-marker.txt &&
                sync &&
                sleep 5
              volumeMounts:
              - name: test-volume
                mountPath: /data
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
            volumes:
            - name: test-volume
              persistentVolumeClaim:
                claimName: mayastor-test-pvc
            restartPolicy: Never
    - assert:
        resource:
          apiVersion: v1
          kind: Pod
          metadata:
            name: mayastor-writer
            namespace: mayastor-test
          status:
            phase: Succeeded
    - script:
        timeout: 60s
        content: |
          # Capture the written data for verification after pod recreation
          MARKER=$(kubectl logs mayastor-writer -n mayastor-test | head -1)
          if [[ -z "${MARKER}" ]]; then
            echo "ERROR: No data was written by the writer pod"
            exit 1
          fi
          # Store marker in a ConfigMap for the reader to verify
          kubectl create configmap mayastor-test-marker \
            -n mayastor-test \
            --from-literal=marker="${MARKER}"
          echo "Data written: ${MARKER}"

  # Step 5: Delete writer Pod
  - name: delete-writer-pod
    try:
    - delete:
        ref:
          apiVersion: v1
          kind: Pod
          name: mayastor-writer
          namespace: mayastor-test
    - script:
        timeout: 60s
        content: |
          # Wait for pod to be fully deleted
          kubectl wait --for=delete pod/mayastor-writer -n mayastor-test --timeout=60s 2>/dev/null || true
          echo "Writer pod deleted"

  # Step 6: Recreate Pod with same PVC and verify data persists
  - name: test-data-persistence
    try:
    - apply:
        resource:
          apiVersion: v1
          kind: Pod
          metadata:
            name: mayastor-reader
            namespace: mayastor-test
          spec:
            containers:
            - name: reader
              image: busybox:latest
              command:
              - sh
              - -c
              - |
                if [ -f /data/test-marker.txt ]; then
                  echo "FOUND:$(cat /data/test-marker.txt)"
                else
                  echo "ERROR: test-marker.txt not found — data did not persist"
                  exit 1
                fi
              volumeMounts:
              - name: test-volume
                mountPath: /data
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
            volumes:
            - name: test-volume
              persistentVolumeClaim:
                claimName: mayastor-test-pvc
            restartPolicy: Never
    - assert:
        resource:
          apiVersion: v1
          kind: Pod
          metadata:
            name: mayastor-reader
            namespace: mayastor-test
          status:
            phase: Succeeded
    - script:
        timeout: 60s
        content: |
          # Verify the reader found the data
          READER_OUTPUT=$(kubectl logs mayastor-reader -n mayastor-test | head -1)
          EXPECTED_MARKER=$(kubectl get configmap mayastor-test-marker -n mayastor-test -o jsonpath='{.data.marker}')

          if [[ "${READER_OUTPUT}" != "FOUND:${EXPECTED_MARKER}" ]]; then
            echo "ERROR: Data mismatch"
            echo "  Expected: FOUND:${EXPECTED_MARKER}"
            echo "  Got:      ${READER_OUTPUT}"
            exit 1
          fi

          echo "Data persistence verified: ${READER_OUTPUT}"

  # Cleanup
  cleanup:
  - delete:
      ref:
        apiVersion: v1
        kind: Namespace
        name: mayastor-test
