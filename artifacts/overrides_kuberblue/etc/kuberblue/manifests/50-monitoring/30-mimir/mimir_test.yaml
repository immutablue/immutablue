apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: mimir-metrics-storage-test
  annotations:
    kuberblue.test/component: "mimir"
    kuberblue.test/category: "monitoring"
    kuberblue.test/priority: "high"
    kuberblue.test/timeout: "600s"
spec:
  timeouts:
    apply: 60s
    assert: 300s
    cleanup: 60s
  steps:
  
  # Step 1: Verify Mimir components are deployed
  - name: verify-mimir-deployment
    try:
    - assert:
        resource:
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: mimir-ingester
            namespace: monitoring
          status:
            readyReplicas: 1
    - assert:
        resource:
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: mimir-store-gateway
            namespace: monitoring
          status:
            readyReplicas: 1
    - assert:
        resource:
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: mimir-compactor
            namespace: monitoring
          status:
            readyReplicas: 1
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: mimir-distributor
            namespace: monitoring
          status:
            readyReplicas: 1
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: mimir-querier
            namespace: monitoring
          status:
            readyReplicas: 1
    - assert:
        resource:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: mimir-query-frontend
            namespace: monitoring
          status:
            readyReplicas: 1
            
  # Step 2: Verify services are available
  - name: verify-mimir-services
    try:
    - assert:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: mimir-distributor
            namespace: monitoring
    - assert:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: mimir-query-frontend
            namespace: monitoring
    - assert:
        resource:
          apiVersion: v1
          kind: Service
          metadata:
            name: mimir-gateway
            namespace: monitoring
            
  # Step 3: Verify Mimir is healthy and accepting connections
  - name: test-mimir-ready
    try:
    - script:
        timeout: 60s
        content: |
          # Just verify Mimir is healthy and accepting connections
          curl -sf http://mimir-gateway.monitoring:8080/ready
            
  # Step 4: Verify persistent volumes
  - name: verify-persistent-storage
    try:
    - assert:
        resource:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            namespace: monitoring
          status:
            phase: Bound
    - script:
        timeout: 30s
        content: |
          # Check that all Mimir PVCs are bound
          kubectl get pvc -n monitoring -l app.kubernetes.io/name=mimir-distributed -o json | \
            jq -e '.items | length > 0 and all(.status.phase == "Bound")' || exit 1
          echo "All Mimir PVCs are bound"
          
  # No cleanup needed — no ephemeral pods created