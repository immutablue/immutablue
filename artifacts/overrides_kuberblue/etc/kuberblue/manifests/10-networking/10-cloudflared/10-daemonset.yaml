# Cloudflare Tunnel DaemonSet for Kuberblue
#
# Runs cloudflared on every node to provide Cloudflare Tunnel ingress.
# The tunnel token is read from a Kubernetes secret.
#
# Before deploying, create the tunnel and secret:
#   1. Create tunnel: cloudflared tunnel create <name>
#   2. Create secret from the template in 20-secret.yaml.tpl
#      kubectl create namespace cloudflared
#      kubectl create secret generic cloudflared-tunnel-token \
#        --namespace cloudflared \
#        --from-literal=tunnel-token=<YOUR_TUNNEL_TOKEN>

apiVersion: v1
kind: Namespace
metadata:
  name: cloudflared
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudflared
  namespace: cloudflared
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/part-of: kuberblue
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel-token
                  key: tunnel-token
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 5
            periodSeconds: 10
      # Tolerate all taints so cloudflared runs on every node (including control-plane)
      tolerations:
        - operator: "Exists"
      # Use host network for direct access to node IPs
      hostNetwork: false
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
