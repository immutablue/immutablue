# /usr/kuberblue/secrets.yaml — SOPS+Age secrets configuration (vendor defaults)
#
# Override by copying to /etc/kuberblue/secrets.yaml

secrets:
  # Enable SOPS+Age secret management
  # When enabled, an Age key pair is generated on first boot and stored at:
  #   private key: /var/lib/kuberblue/secrets/age.key (mode 0600, root:kuberblue)
  #   public key:  /var/lib/kuberblue/secrets/age.pub  (mode 0644)
  # The public key is also exported as a Kubernetes secret in flux-system namespace
  # so Flux can decrypt SOPS-encrypted manifests in the GitOps repo.
  enabled: false

  # Age recipient public keys (from other nodes or operators who can decrypt)
  # Add your own public key here so you can encrypt secrets for this cluster.
  # Format: age1... strings (one per line)
  recipients: []

  # .sops.yaml configuration path in the GitOps repo
  # Flux will use this to find the decryption key
  sops_config_path: .sops.yaml
