# /usr/kuberblue/cluster.yaml — kuberblue cluster configuration (vendor defaults)
#
# This file contains read-only vendor defaults baked into the image.
# To override any setting, copy this file to /etc/kuberblue/cluster.yaml
# and modify only the keys you need. /etc/ takes full precedence.
#
# Changes to this file require an OS image update (rpm-ostree upgrade).
# Changes to /etc/kuberblue/cluster.yaml take effect on next boot.

cluster:
  # Human-readable cluster name (used in kubeadm ClusterConfiguration.clusterName)
  name: kuberblue

  # Topology mode: single | multi | ha
  #   single — single control-plane node; control-plane taint removed automatically
  #   multi  — control-plane + worker nodes; workers join via kubeadm join token
  #   ha     — three-node HA control-plane with kube-vip VIP; requires ha.vip_address
  topology: single

  # Node role on this machine: control-plane | worker | auto
  # In 'single' topology, always control-plane.
  # In 'multi'/'ha', set to 'worker' on non-control-plane nodes.
  # 'auto' — detect role automatically:
  #   - If cluster-initialized state exists, use stored role
  #   - If /etc/kubernetes/admin.conf exists, control-plane
  #   - Otherwise, default to worker (multi) or control-plane (single)
  node_role: control-plane

  # Container runtime: crio (only supported option)
  container_runtime: crio

  # CRI socket path (derived from container_runtime; override only if non-standard)
  cri_socket: /var/run/crio/crio.sock

  # Swap policy: disabled | enabled
  # Kubernetes requires swap to be off; kuberblue disables it on every boot.
  swap: disabled

  # Automatically initialize the cluster on first boot
  # Set to false to require manual 'kuberblue init'
  auto_init: true

  # Advertise address for the API server.
  # 'auto'          — use the primary interface IP
  # 'tailscale'     — use the Tailscale IP (requires networking.tailscale.enabled: true)
  # '192.168.x.x'   — explicit IP address
  advertise_address: auto

  # Kubernetes networking
  networking:
    pod_subnet: 10.244.0.0/16
    service_subnet: 10.96.0.0/16
    dns_domain: cluster.local

  # Multi-node settings (ignored unless topology: multi or ha)
  multi:
    # Automatically join workers to the cluster on first boot
    # Requires token_distribution to be set to a supported method
    worker_auto_join: false
    # How join tokens are distributed to workers: manual | tailscale
    #   manual    — operator copies token to worker node
    #   tailscale — CP serves token over Tailscale; workers fetch automatically
    token_distribution: manual
    # TTL for join tokens (kubeadm token --ttl)
    token_ttl: 24h

  # HA mode settings (ignored unless topology: ha)
  ha:
    # Virtual IP for kube-vip (required for ha topology)
    vip_address: ""
    # Interface for kube-vip to bind (empty = auto-detect)
    vip_interface: ""
    # Number of control-plane nodes in the HA cluster
    control_planes: 3
    # Load balancer for the HA control-plane VIP
    load_balancer: kube-vip
    # Use an external etcd cluster instead of stacked etcd
    external_etcd: false

  # State directory (writable, survives upgrades)
  state_dir: /var/lib/kuberblue

# Storage configuration
# Controls persistent volume backend. Ignored unless the relevant optional
# package is enabled in packages.yaml (mayastor, openebs-lvm, etc.)
storage:
  # Backend: hostpath | mayastor | lvm
  #   hostpath — LocalPV hostpath (default; single-node only, no replication)
  #   mayastor  — OpenEBS Replicated PV via NVMe-oF (HA; requires nodes below)
  #   lvm       — OpenEBS LVM LocalPV (flexible sizing; no replication)
  backend: hostpath

  # Disk pool configuration — required when backend: mayastor
  # node names MUST exactly match Kubernetes node names (i.e. system hostnames).
  # Run `kubectl get nodes` after init to verify names.
  # Each node entry needs exactly one of: disk (block device) or zvol (ZFS zvol path).
  nodes: []
  # Example — dedicated block device per node:
  # nodes:
  #   - name: node1          # must match `kubectl get nodes` NAME column
  #     disk: /dev/nvme1n1   # raw block device; will be owned exclusively by Mayastor
  #   - name: node2
  #     disk: /dev/nvme1n1
  #   - name: node3
  #     disk: /dev/nvme1n1
  #
  # Example — ZFS zvol per node (ZFS-on-root, single disk):
  # nodes:
  #   - name: node1
  #     zvol: rpool/mayastor  # kuberblue creates the zvol if it does not exist
  #   - name: node2
  #     zvol: rpool/mayastor
  #   - name: node3
  #     zvol: rpool/mayastor

  # Zvol size — used when kuberblue creates zvols automatically
  # Ignored when disk: is specified.
  zvol_size: 200G

  # Default replica count for the openebs-replicated StorageClass.
  # Must be <= number of storage nodes. Minimum 3 for full HA.
  replica_count: 3
