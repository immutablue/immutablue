# /usr/kuberblue/kubeadm.yaml — kubeadm cluster configuration (vendor defaults)
#
# This is the VENDOR DEFAULT kubeadm config. The init script generates the
# runtime config at /var/lib/kuberblue/kubeadm-generated.yaml by merging this
# template with live values from cluster.yaml (CRI socket, advertise address,
# subnets, etc.). Never pass this file directly to kubeadm init — always use
# the generated file.
#
# Override by copying to /etc/kuberblue/kubeadm.yaml

---
apiVersion: kubeadm.k8s.io/v1beta4
kind: InitConfiguration
nodeRegistration:
  criSocket: /var/run/crio/crio.sock
  kubeletExtraArgs:
    - name: volume-plugin-dir
      value: /opt/libexec/kubernetes/kubelet-plugins/volume/exec/
# localAPIEndpoint.advertiseAddress is injected at runtime from cluster.yaml
---
apiVersion: kubeadm.k8s.io/v1beta4
kind: ClusterConfiguration
controllerManager:
  extraArgs:
    - name: flex-volume-plugin-dir
      value: /opt/libexec/kubernetes/kubelet-plugins/volume/exec/
networking:
  podSubnet: 10.244.0.0/16
  serviceSubnet: 10.96.0.0/16
  dnsDomain: cluster.local
---
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
cgroupDriver: systemd
