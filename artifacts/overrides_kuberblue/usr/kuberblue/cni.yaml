# /usr/kuberblue/cni.yaml — kuberblue networking configuration (vendor defaults)
#
# Override by copying to /etc/kuberblue/cni.yaml

networking:
  # CNI plugin: cilium (only supported option)
  cni: cilium

  # Tailscale mesh networking
  # When enabled, Tailscale is configured as a host-level daemon BEFORE the cluster
  # exists. The API server advertise_address can be set to 'tailscale' in cluster.yaml
  # to advertise on the Tailscale IP, enabling cross-network multi-node clusters.
  tailscale:
    enabled: false
    # Accept routes from subnet routers in the tailnet
    accept_routes: true
    # Advertise this node as a subnet router (CIDR)
    # Set to pod_subnet to make pods reachable from the tailnet
    advertise_routes: ""
    # Tailscale ACL tag for this node (e.g. tag:kuberblue-cp)
    # Used by auto-discovery in multi-node topologies
    tag: ""
    # Expose the API server on the Tailscale interface
    # Allows kubectl access from any device on the tailnet
    # Read by: kube_generate_kubeadm_config.sh (advertise address logic)
    api_server_on_tailnet: false
    # Kubernetes secret name containing the Tailscale auth key
    # If set, the key is read from this secret instead of /etc/kuberblue/tailscale-authkey
    # Read by: kube_tailscale_setup.sh (auth key provisioning)
    auth_key_secret: ""

  # Cilium CNI advanced settings
  # Read by: Cilium Helm values (kube_deploy.sh applies 00-cilium/10-values.yaml)
  cilium:
    # TODO: wire to Cilium Helm values (currently uses Cilium defaults)
    # Routing mode: tunnel | native
    #   tunnel — VXLAN/Geneve encapsulation (works everywhere, slight overhead)
    #   native — direct routing (requires L2 adjacency or BGP, lower overhead)
    routing_mode: tunnel
    # TODO: wire to Cilium Helm values (currently uses Cilium defaults)
    # WireGuard encryption for pod-to-pod traffic: disabled | wireguard
    #   disabled  — no encryption (default; trust the network)
    #   wireguard — transparent WireGuard encryption between nodes
    encryption: disabled

  # Cloudflare Tunnel — public ingress via Cloudflare's network
  # Runs as a DaemonSet inside the cluster (one cloudflared pod per node).
  # Requires a Cloudflare account and tunnel token.
  # Read by: 10-networking/10-cloudflared/10-daemonset.yaml (secret name)
  cloudflare_tunnel:
    enabled: false
    # Kubernetes secret name containing the Cloudflare tunnel token
    # Must match the secret name in 10-cloudflared/10-daemonset.yaml
    token_secret: cloudflared-tunnel-token
    # Namespace for the cloudflared DaemonSet
    namespace: cloudflared

  # Kube-proxy replacement via Cilium (always true — do not change)
  # Setting this to false would require kube-proxy reinstallation.
  # Read by: Cilium Helm values (kube-proxy-replacement flag)
  kube_proxy_replacement: true
