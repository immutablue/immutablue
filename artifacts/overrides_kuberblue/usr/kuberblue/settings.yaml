# /usr/kuberblue/settings.yaml — kuberblue global settings (vendor defaults)
#
# Override by copying to /etc/kuberblue/settings.yaml and editing as needed.
# Per-key fallthrough applies: unset keys inherit from this file.

kuberblue:
  # Directory where kuberblue build artifacts are installed at image build time.
  # This is NOT the same as the Justfile install_dir (/usr/immutablue), which is
  # the base immutablue install path used by run_post_install.sh.
  install_dir: /usr/immutablue-build-kuberblue

  # UID for the kuberblue system user/group
  # NOTE: 970 conflicts with pipewire on Fedora 43. Use 960 instead.
  uid: 960
