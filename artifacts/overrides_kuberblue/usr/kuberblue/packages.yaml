# /usr/kuberblue/packages.yaml — kuberblue package tier configuration (vendor defaults)
#
# Three-tier package system:
#   Tier 1 (core)    — always installed; cannot be disabled
#   Tier 2 (optional) — enabled by setting enabled: true
#   Tier 3 (custom)  — user-defined manifests in /etc/kuberblue/manifests/
#
# Override by copying to /etc/kuberblue/packages.yaml

packages:
  # Tier 1: Core packages (always deployed)
  core:
    - name: cilium
      description: "CNI + kube-proxy replacement"
      manifest: 00-infrastructure/00-cilium
    - name: openebs
      description: "Container-native storage (hostpath LocalPV, default StorageClass)"
      manifest: 00-infrastructure/10-openebs
    - name: metrics-server
      description: "Resource usage metrics for HPA/kubectl top"
      manifest: 00-infrastructure/20-metrics-server
    - name: flux
      description: "GitOps continuous delivery"
      # Flux is bootstrapped via CLI (flux bootstrap git), not via Helm manifests.
      # The 00-infrastructure/30-flux/ dir contains only tests and docs.
      manifest: ~

  # Tier 2: Optional packages (opt-in)
  optional:
    - name: tailscale-operator
      description: "Tailscale Kubernetes operator for mesh networking"
      manifest: 10-networking/00-tailscale-operator
      enabled: false
    - name: cloudflared
      description: "Cloudflare Tunnel ingress DaemonSet"
      manifest: 10-networking/10-cloudflared
      enabled: false
    - name: alloy
      description: "Grafana Alloy unified telemetry collector"
      manifest: 50-monitoring/00-alloy
      enabled: false
    - name: grafana
      description: "Grafana dashboards and visualization"
      manifest: 50-monitoring/10-grafana
      enabled: false
    - name: loki
      description: "Loki log aggregation"
      manifest: 50-monitoring/20-loki
      enabled: false
    - name: mimir
      description: "Mimir long-term metrics storage"
      manifest: 50-monitoring/30-mimir
      enabled: false
    - name: tempo
      description: "Tempo distributed tracing backend"
      manifest: 50-monitoring/40-tempo
      enabled: false
    - name: kube-vip
      description: "HA virtual IP for control-plane (required for ha topology)"
      # Deployed as a static pod by kube_vip_setup.sh, not via Helm manifests.
      manifest: ~
      enabled: false
    # mayastor is a configuration variant of openebs, not a separate package.
    # Enable it by overriding openebs values with:
    #   engines.replicated.mayastor.enabled: true
    #   localpv.enabled: false
    # See 00-infrastructure/10-openebs/10-values.yaml for details.
    - name: cert-manager
      description: "X.509 certificate management (Let's Encrypt, self-signed, CA issuers)"
      manifest: 00-infrastructure/50-cert-manager
      enabled: false
    - name: velero
      description: "Kubernetes backup and restore (snapshots cluster state + PVs to object storage)"
      manifest: 50-backup/00-velero
      enabled: false
