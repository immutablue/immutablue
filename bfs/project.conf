# Blue From Scratch (BFS) - BuildStream Project Configuration
# ============================================================
# Builds Immutablue from source using freedesktop-sdk as the base
# toolchain, producing a bootc-compatible OCI image.
#
# This is the "distroless" path for Immutablue -- no Fedora, no RPMs,
# just source-compiled components on top of the freedesktop-sdk runtime.

name: immutablue-bfs
min-version: 2.3

element-path: elements

# Architecture option (auto-detected from host)
options:
  arch:
    type: arch
    description: Target architecture
    values:
    - x86-64
    - aarch64

# Source aliases for upstream repos
aliases:
  gnome: https://gitlab.gnome.org/GNOME/
  freedesktop: https://gitlab.freedesktop.org/
  github: https://github.com/
  kernel: https://cdn.kernel.org/pub/linux/kernel/

# Project-wide variables
variables:
  prefix: /usr
  sysconfdir: /etc
  localstatedir: /var
  lib: lib64
  libdir: "%{prefix}/%{lib}"
  sbindir: "%{prefix}/sbin"
  # Build parallelism
  max-jobs: "%{max-cpus}"

  # Immutablue version info
  immutablue-version: "43"
  immutablue-variant: "bfs"

  # Kernel version to build
  kernel-version: "6.12.12"
  kernel-major: "6"

  # Go architecture mapping
  (?):
  - arch == "x86-64":
      go-arch: amd64
  - arch == "aarch64":
      go-arch: arm64

# Build environment
environment:
  PATH: /usr/bin:/usr/sbin:/bin:/sbin
  PKG_CONFIG_PATH: "%{libdir}/pkgconfig:/usr/share/pkgconfig"
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8

# Plugin sources
# OCI element plugin from buildstream-plugins-community
# Install with: pip install buildstream-plugins-community
plugins:
- origin: pip
  package-name: buildstream-plugins-community
  elements:
    - oci

# Split rules for artifact organization
split-rules:
  devel:
    (>):
    - "%{prefix}/include"
    - "%{prefix}/include/**"
    - "%{libdir}/pkgconfig"
    - "%{libdir}/pkgconfig/**"
    - "%{prefix}/share/pkgconfig"
    - "%{prefix}/share/pkgconfig/**"
    - "%{libdir}/*.a"
    - "%{libdir}/*.la"
  doc:
    (>):
    - "%{prefix}/share/man"
    - "%{prefix}/share/man/**"
    - "%{prefix}/share/doc"
    - "%{prefix}/share/doc/**"
    - "%{prefix}/share/info"
    - "%{prefix}/share/info/**"
